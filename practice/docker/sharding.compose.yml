services:
  citus-coordinator:
    image: citusdata/citus:13.0
    environment:
      POSTGRES_DB: ${SHARD_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SHARD_COORDINATOR_PORT}:5432"
    depends_on:
      citus-worker-01:
        condition: service_healthy
      citus-worker-02:
        condition: service_healthy
      citus-worker-03:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${SHARD_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  citus-worker-01:
    image: citusdata/citus:13.0
    environment:
      POSTGRES_DB: ${SHARD_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SHARD_WORKER1_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${SHARD_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  citus-worker-02:
    image: citusdata/citus:13.0
    environment:
      POSTGRES_DB: ${SHARD_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SHARD_WORKER2_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${SHARD_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  citus-worker-03:
    image: citusdata/citus:13.0
    environment:
      POSTGRES_DB: ${SHARD_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SHARD_WORKER3_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${SHARD_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
