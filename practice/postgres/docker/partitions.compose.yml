services:
  pg:
    image: postgres:17
    environment:
      POSTGRES_DB: ${PART_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PART_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PART_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
